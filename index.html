<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>About Me</title>
  
<!-- SATISFY FONT -->
<link href="https://fonts.googleapis.com/css2?family=Satisfy&display=swap" rel="stylesheet">
 <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
  
<style>

/* CHANGE DESKTOP BACKGROUND HERE */
:root{
    --desktop-bg: url("https://xatimg.com/image/dapYtfz5t99n.gif");
}

body{
    margin:0;
    padding:0;
    background-image: var(--desktop-bg);
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    font-family: "Lucida Grande", Tahoma, sans-serif;
}

/* Desktop */

.desktop{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* Window */

.window{
    width:700px;
    border-radius:10px;
    background:#e8e8e8;
    box-shadow:0 8px 20px rgba(0,0,0,0.4);
    border:1px solid #888;
    overflow:hidden;
}

/* Title bar */

.titlebar{
    height:28px;
    background:linear-gradient(#e9f1fb,#b7c7db);
    display:flex;
    align-items:center;
    padding:0 10px;
    border-bottom:1px solid #8a9db5;
    position:relative;
}

/* glossy highlight */

.titlebar::after{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:50%;
    background:linear-gradient(rgba(255,255,255,0.7), rgba(255,255,255,0));
    pointer-events:none;
}

.buttons{
    display:flex;
    gap:6px;
    margin-right:10px;
}

.btn{
    width:12px;
    height:12px;
    border-radius:50%;
}

.red{ background:#ff5f57; }
.yellow{ background:#ffbd2e; }
.green{ background:#28c840; }

.title{
    font-size:13px;
    font-weight:bold;
}

/* Layout */

.content{
    display:flex;
}

/* Sidebar */

.sidebar{
    width:200px;
    background:#d4d4d4;
    border-right:1px solid #aaa;
    padding:15px;
}

.sidebar h3{
    margin-top:0;
    font-size:14px;
}

/* Sidebar links with icons */

.sidebar a{
    display:flex;
    align-items:center;
    gap:8px;
    text-decoration:none;
    color:#333;
    margin:8px 0;
    font-size:13px;
    transition: color 0.25s ease;
}

/* Hover effect */

.sidebar a:hover{
    color:#3b7cff;
}

.sidebar img{
    width:18px;
    height:18px;
    transition:transform 0.2s ease;
}

.sidebar a:hover img{
    transform:scale(1.1);
}

/* Main content */

.main{
    flex:1;
    padding:20px;
    background:#f5f5f5;
}

/* Profile layout */

.profile{
    display:flex;
    gap:15px;
}

.profile img{
    width:90px;
    border-radius:6px;
}

 /* BIG NAME TRICK */

.name{
    font-family:"Satisfy", cursive;
    font-size:42px;
    margin:0;
    color:#66CBFF;
}
  
/* online indicator */

.online{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:14px;
    color:#2ecc71;
    margin-top:3px;
    font-weight:bold;
}

/* green status dot */

.statusdot{
    width:8px;
    height:8px;
    background:#2ecc71;
    border-radius:50%;
    box-shadow:0 0 6px #2ecc71;
}
  
.abouttext{
    font-family:"Patrick Hand", cursive;
    font-size:18px;
    text-align:center;
    color:#444;
    line-height:1.5;
}
 
.footer{
    text-align:center;
    font-size:11px;
    color:#333;
    padding:8px;
}
  
</style>
</head>

<body>

  <script>

const text = " leo - female - single - chicago,il";

let i = 0;
const speed = 40;

function typeWriter(){
    if(i < text.length){
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, speed);
    }
}

typeWriter();
